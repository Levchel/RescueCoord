services:
  coord_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coordination_db
      POSTGRES_USER: coord_user
      POSTGRES_PASSWORD: coord_pass
    ports:
      - "5433:5432"
    volumes:
      - coord_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coord_user -d coordination_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - rescuecoord_net

  monitoring_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: monitoring_db
      POSTGRES_USER: monitor_user
      POSTGRES_PASSWORD: monitor_pass
    ports:
      - "5434:5432"
    volumes:
      - monitoring_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor_user -d monitoring_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - rescuecoord_net

  coordination_service:
    build:
      context: ./coordination_service
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://coord_user:coord_pass@coord_db:5432/coordination_db
      MONITORING_SERVICE_URL: http://monitoring_service:8000
      OTEL_ENDPOINT: http://otel-collector:4318
    depends_on:
      coord_db:
        condition: service_healthy
    networks:
      - rescuecoord_net

  monitoring_service:
    build:
      context: ./monitoring_service
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://monitor_user:monitor_pass@monitoring_db:5432/monitoring_db
      OTEL_ENDPOINT: http://otel-collector:4318
    depends_on:
      monitoring_db:
        condition: service_healthy
    networks:
      - rescuecoord_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - coordination_service
      - monitoring_service
    networks:
      - rescuecoord_net

  # ── Observability stack ────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./observability/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus scrape-endpoint
    networks:
      - rescuecoord_net

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
      - coordination_service
      - monitoring_service
    networks:
      - rescuecoord_net

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - rescuecoord_net

volumes:
  coord_data:
  monitoring_data:
  prometheus_data:
  grafana_data:

networks:
  rescuecoord_net:
    driver: bridge
