receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  # Экспорт метрик в формате Prometheus (scrape-endpoint на порту 8889)
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "otelcol"

  # Отладочный вывод трейсов в лог коллектора
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
