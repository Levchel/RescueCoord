name: CD - Build and Push Docker Images

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - { name: coordination_service, dockerfile: coordination_service/Dockerfile }
          - { name: monitoring_service, dockerfile: monitoring_service/Dockerfile }
          - { name: frontend, dockerfile: frontend/Dockerfile }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy services
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "Docker images built and pushed to ${{ env.REGISTRY }}"
          echo "Services deployed:"
          echo "  - ghcr.io/${{ github.repository }}/coordination_service:latest"
          echo "  - ghcr.io/${{ github.repository }}/monitoring_service:latest"
          echo "  - ghcr.io/${{ github.repository }}/frontend:latest"
          echo ""
          echo "To deploy to your server, run:"
          echo "  docker-compose -f docker-compose.prod.yml pull"
          echo "  docker-compose -f docker-compose.prod.yml up -d"

      # Uncomment below to enable remote deployment
